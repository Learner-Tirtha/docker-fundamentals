<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>

    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:linear-gradient(135deg,#4facfe,#00f2fe);
        }

        .card{
            width:420px;
            background:white;
            padding:35px;
            border-radius:12px;
            box-shadow:0 10px 20px rgba(0,0,0,.2);
        }

        h2{text-align:center;margin-bottom:20px;}

        input,select,button{
            width:100%;
            padding:12px;
            margin:10px 0;
            border-radius:6px;
            border:1px solid #ccc;
        }

        button{
            background:#2196f3;
            color:white;
            border:none;
            cursor:pointer;
        }

        button:hover{
            background:#1976d2;
        }

        #studentFields,#facultyFields{
            display:none;
        }

        p{
            text-align:center;
            margin-top:15px;
        }
    </style>

    <script>

        function toggleRole(){

            let role=document.getElementById("role").value;

            document.getElementById("studentFields").style.display=
                role==="STUDENT"?"block":"none";

            document.getElementById("facultyFields").style.display=
                role==="FACULTY"?"block":"none";

        }

    </script>

</head>

<body onload="toggleRole()">

<div class="card">

    <h2>Create Account</h2>
    <p th:if="${error}" style="color:red;" th:text="${error}"></p>
    <form th:action="@{/register}" method="post">

        <input
                type="text"
                name="username"
                placeholder="Username"
                required>

        <input
                type="password"
                name="password"
                placeholder="Password"
                required>

        <input
                type="text"
                name="name"
                placeholder="Full Name"
                required>

        <select
                id="role"
                name="role"
                onchange="toggleRole()">

            <option value="STUDENT">Student</option>
            <option value="FACULTY">Faculty</option>

        </select>

        <div id="studentFields">

            <input
                    type="text"
                    name="abcID"
                    placeholder="ABC ID">

            <input
                    type="text"
                    name="idNo"
                    placeholder="Student ID">

        </div>

        <div id="facultyFields">

            <input
                    type="text"
                    name="department"
                    placeholder="Department">

        </div>

        <button type="submit">
            Register
        </button>

    </form>

    <p>

        Already have an account?

        <a th:href="@{/login}">
            Login
        </a>

    </p>

</div>

</body>
</html>
